# Required for the deploy job:
#   secrets.CLOUDFLARE_API_TOKEN  (dash.cloudflare.com/profile/api-tokens, "Edit Cloudflare Workers" template)
#   secrets.CLOUDFLARE_ACCOUNT_ID (CF dashboard sidebar)
#   vars.D1_DATABASE_ID           (UUID from `wrangler d1 list`)
#   vars.WORKER_DOMAIN            (custom domain, e.g. "burnbox.example.com" — zone must be on Cloudflare)

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  deploy:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: envsubst < wrangler.toml.example > wrangler.toml
        env:
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
          WORKER_DOMAIN: ${{ vars.WORKER_DOMAIN }}
      - run: npm run build:frontend
      - run: npx wrangler d1 migrations apply burnbox-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
