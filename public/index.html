<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <meta name="theme-color" content="#0E0E10" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAFAFA" media="(prefers-color-scheme: light)" />
    <meta
      name="description"
      content="Send fully private notes and files. End-to-end encrypted in your browser; the server never sees what you sent. Burns after the read limit is reached."
    />
    <link rel="canonical" href="https://burnbox.brianton.me/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://burnbox.brianton.me/" />
    <meta property="og:title" content="Burnbox" />
    <meta
      property="og:description"
      content="Send fully private notes and files. End-to-end encrypted in your browser."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Burnbox" />
    <meta
      name="twitter:description"
      content="Send fully private notes and files. End-to-end encrypted in your browser."
    />
    <title>Burnbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <a href="/" class="header__brand" aria-label="Burnbox home">Burnbox</a>
        <nav class="header__nav">
          <a href="/about">About</a>
          <a
            href="https://github.com/mrtonbrian/burnbox"
            target="_blank"
            rel="noopener"
            class="header__nav-icon"
            aria-label="View source on GitHub"
          >
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path
                d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"
              />
              <path d="M9 18c-4.51 2-5-2-7-2" />
            </svg>
          </a>
        </nav>
      </header>

      <main class="main" id="content">
        <form class="create-form fade-in" id="create-form" novalidate>
          <textarea
            id="note-input"
            class="textarea"
            placeholder="Type a private note. Markdown supported."
            aria-label="Note content"
            rows="6"
          ></textarea>

          <label class="drop-zone" id="drop-zone">
            <span class="drop-zone__icon"><i data-lucide="paperclip"></i></span>
            <span class="drop-zone__label" id="drop-zone-label">Drop files or click to attach</span>
            <span class="drop-zone__hint">Up to 100 MB total</span>
            <input
              type="file"
              id="file-input"
              class="drop-zone__input"
              multiple
              aria-label="Choose files to attach"
            />
          </label>

          <div class="file-list" id="files-list"></div>

          <div class="settings-row">
            <div class="segmented" id="expiry" role="radiogroup" aria-label="Expiry">
              <button type="button" class="segmented__option" data-value="1" role="radio">
                1 h
              </button>
              <button
                type="button"
                class="segmented__option"
                data-value="24"
                role="radio"
                aria-checked="true"
              >
                24 h
              </button>
              <button type="button" class="segmented__option" data-value="168" role="radio">
                7 d
              </button>
              <button type="button" class="segmented__option" data-value="720" role="radio">
                30 d
              </button>
            </div>

            <button
              type="button"
              class="listbox-trigger"
              id="max-views-trigger"
              aria-haspopup="listbox"
              aria-label="Max views"
              data-value="1"
            >
              <span class="listbox-trigger__label">1 view</span>
              <span class="listbox-trigger__chevron"><i data-lucide="chevron-down"></i></span>
            </button>

            <div class="password-toggle" id="password-toggle" data-on="false">
              <button
                type="button"
                class="password-toggle__header"
                id="password-toggle-button"
                aria-pressed="false"
                aria-controls="password-field"
              >
                <span>Password protection</span>
                <span class="password-toggle__check"><i data-lucide="check"></i></span>
              </button>
            </div>
          </div>

          <div class="collapse" id="password-collapse" data-open="false">
            <div class="collapse__inner">
              <div class="field">
                <input
                  type="password"
                  id="password-input"
                  class="input"
                  placeholder="Set a password (optional)"
                  aria-label="Password"
                  autocomplete="off"
                  data-form-type="other"
                  data-1p-ignore
                  data-lpignore="true"
                />
                <div class="field__hint">
                  Recipient will need to enter this password. We don't store it.
                </div>
              </div>
            </div>
          </div>

          <div class="field__error" id="form-error" aria-live="polite"></div>

          <div class="actions">
            <button type="submit" id="submit-button" class="btn btn--primary">
              Send privately
            </button>
          </div>
        </form>
      </main>
    </div>

    <dialog class="listbox-popover" id="max-views-popover" aria-label="Max views">
      <div class="listbox-panel" role="listbox" id="max-views-listbox">
        <button
          type="button"
          class="listbox-option"
          role="option"
          data-value="1"
          aria-selected="true"
        >
          <span>1 view</span>
          <span class="listbox-option__check"><i data-lucide="check"></i></span>
        </button>
        <button type="button" class="listbox-option" role="option" data-value="3">
          <span>3 views</span>
          <span class="listbox-option__check"><i data-lucide="check"></i></span>
        </button>
        <button type="button" class="listbox-option" role="option" data-value="5">
          <span>5 views</span>
          <span class="listbox-option__check"><i data-lucide="check"></i></span>
        </button>
        <button type="button" class="listbox-option" role="option" data-value="10">
          <span>10 views</span>
          <span class="listbox-option__check"><i data-lucide="check"></i></span>
        </button>
      </div>
    </dialog>

    <template id="t-file-row">
      <div class="file-row" data-state="pending">
        <span class="file-row__icon"><i data-lucide="file"></i></span>
        <span class="file-row__name"></span>
        <span class="file-row__size"></span>
        <button type="button" class="btn btn--icon-only" data-remove>
          <i data-lucide="x"></i>
        </button>
        <div class="file-row__progress"></div>
      </div>
    </template>

    <template id="t-share">
      <section class="share fade-in">
        <span class="share__caption">Note created</span>
        <div class="share__card">
          <div
            class="share__url"
            data-share-url
            tabindex="0"
            role="textbox"
            aria-readonly="true"
            aria-label="Share URL"
          ></div>
          <hr class="share__divider" />
          <div class="share__meta">
            <span data-share-views></span>
            <span data-share-expires></span>
          </div>
          <div class="share__actions">
            <button type="button" class="btn btn--primary" data-copy>
              <span class="btn__icon" data-copy-icon><i data-lucide="copy"></i></span>
              <span data-copy-label>Copy link</span>
            </button>
          </div>
        </div>
      </section>
    </template>

    <script type="module" src="/assets/create.js"></script>
  </body>
</html>
